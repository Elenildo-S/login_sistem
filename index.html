<!-- Define HTML5 -->
<!DOCTYPE html>

<!-- Início html -->
<html lang="pt-BR">

<head>

    <!-- Define acentos -->
    <meta charset="UTF-8">

    <!-- Título aba navegador -->
    <title>Login</title>

    <!-- Importa css -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Container central -->
    <div class="container">

        <!-- Caixa login -->
        <div class="box">

            <!-- Título -->
            <h1>Login</h1>

            <!-- Campo email -->
            <input id="email" placeholder="Digite seu email">

            <!-- Campo senha -->
            <input id="senha" type="password" placeholder="Digite sua senha">

            <!-- Botão login -->
            <button onclick="login()">

                Entrar

            </button>

            <!-- Link cadastro -->
            <a href="cadastro.html">

                Criar conta

            </a>

        </div>

    </div>

    <!-- Importa javascript -->
    <script src="js/login.js"></script>

</body>

</html>
